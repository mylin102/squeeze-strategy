# Squeeze Strategy Configuration
# 基準策略 - 加入 10% 停損

name: baseline
version: 1.2
description: "基準策略 - 加入 10% 停損機制"
author: Squeeze Team
created: 2026-03-28
updated: 2026-03-28

# 市場設定
market:
  us:
    enabled: true
    default: false
  tw:
    enabled: true
    default: true
  cn:
    enabled: true
    default: false

# 進場過濾器 (寬鬆)
entry_filters:
  min_momentum: -0.5
  max_momentum: null
  min_energy_level: 0
  require_squeeze_on: false
  require_fired: false
  min_value_score: null

# 形態選擇
patterns:
  - squeeze
  - houyi
  - whale

# 信號類型
signal_types:
  - buy
  - sell

# 市場狀態過濾
market_regime:
  allowed_regimes: null

# 出場規則 (加入 10% 停損)
exit_rules:
  stop_loss_pct: 10.0           # ← 10% 停損
  take_profit_pct: 25.0
  holding_days: 14
  time_stop_days: 7             # 7 天時間停損
  trailing_stop:
    enabled: true
    activation_pct: 15.0        # 獲利 15% 後啟動
    trail_pct: 5.0              # 回檔 5% 出場

# 倉位管理
position_sizing:
  position_size_pct: 100.0
  max_single_position: 10.0
  max_positions: 10

# 空頭市場調整
bear_market_adjustments:
  enabled: false

# 績效目標
performance_targets:
  target_annual_return: 50.0
  max_drawdown: 20.0            # 降低最大回撤目標
  min_sharpe_ratio: 1.5
  min_win_rate: 50.0

# 日誌與通知
logging:
  level: INFO
  
notifications:
  email:
    enabled: false
  line:
    enabled: false

# 回測設定
backtest:
  initial_capital: 1000000
  commission_pct: 0.1
  slippage_pct: 0.05
  benchmark: 0050.TW

# Squeeze Strategy Configuration
# 平衡策略 - 美股最佳表現

name: balanced
version: 1.0
description: "平衡策略 - 結合 Squeeze + Whale，美股回測 +199.81%"
author: Squeeze Team
created: 2026-03-28
updated: 2026-03-28

# 市場設定
market:
  us:
    enabled: true
    default: true
  tw:
    enabled: false
    default: false
  cn:
    enabled: false
    default: false

# 進場過濾器
entry_filters:
  min_momentum: 0.0
  max_momentum: null
  min_energy_level: 0
  require_squeeze_on: false
  require_fired: false
  min_value_score: null

# 形態選擇 (關鍵差異：只用 squeeze + whale)
patterns:
  - squeeze
  - whale

# 信號類型
signal_types:
  - buy

# 市場狀態過濾
market_regime:
  allowed_regimes: null

# 出場規則
exit_rules:
  stop_loss_pct: 10.0
  take_profit_pct: 20.0
  holding_days: 14
  time_stop_days: null

# 倉位管理
position_sizing:
  position_size_pct: 100.0
  max_single_position: 10.0
  max_positions: 10

# 空頭市場調整
bear_market_adjustments:
  enabled: false

# 績效目標
performance_targets:
  target_annual_return: 100.0
  max_drawdown: 40.0
  min_sharpe_ratio: 1.5
  min_win_rate: 45.0

# 日誌與通知
logging:
  level: INFO
  
notifications:
  email:
    enabled: false
  line:
    enabled: false

# 回測設定
backtest:
  initial_capital: 1000000
  commission_pct: 0.1
  slippage_pct: 0.05
  benchmark: SPY
